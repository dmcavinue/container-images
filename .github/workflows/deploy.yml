name: Docker

on:
  push:
    branches:
      - master
    paths:
      - 'apps/**/VERSION'
  pull_request:
    branches:
      - master
    paths:
      - 'apps/**/VERSION'
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the images
        run: |
          for versionFilePath in $(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} ${{ github.event.before }} | grep "VERSION");
          do
            folder=${versionFilePath%"/VERSION"}
            IMAGE_NAME=${folder##*/}
            VERSION=$(cat $versionFilePath)
            IMAGE_ID=ghcr.io/${{ github.actor }}/$IMAGE_NAME

            echo "Building $IMAGE_ID:$VERSION for amd64 and arm64"

            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --push \
              --tag $IMAGE_ID:$VERSION \
              --build-arg VERSION=$VERSION \
              --file $folder/Dockerfile \
              $folder
          done;